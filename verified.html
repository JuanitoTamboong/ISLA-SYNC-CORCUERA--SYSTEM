<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verified | Isla Sync</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            overflow: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.1) 0%, transparent 50%);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }

        /* Floating particles */
        .particle {
            position: absolute;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            pointer-events: none;
            animation: float linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            text-align: center;
            background: white;
            padding: 60px 50px;
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 90%;
            z-index: 1;
            animation: slideUp 0.6s ease-out;
            position: relative;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Animated checkmark */
        .checkmark-wrapper {
            margin-bottom: 30px;
        }

        .checkmark-circle {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            animation: scaleIn 0.5s ease-out, glow 2s ease-in-out infinite;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
        }

        @keyframes scaleIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes glow {
            0%, 100% {
                box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
            }
            50% {
                box-shadow: 0 15px 40px rgba(16, 185, 129, 0.5);
            }
        }

        .checkmark {
            font-size: 55px;
            color: white;
            font-weight: bold;
            animation: checkBounce 0.6s ease-out 0.3s both;
        }

        @keyframes checkBounce {
            0% {
                transform: scale(0);
            }
            80% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
            }
        }

        h1 {
            color: #1f2937;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
        }

        .message-box {
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            border-radius: 16px;
            padding: 20px;
            margin: 25px 0;
            border: 1px solid #bbf7d0;
        }

        .message-box p {
            color: #166534;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 0;
        }

        .message-box .small-text {
            font-size: 13px;
            color: #15803d;
            margin-top: 10px;
            display: block;
        }

        .info-text {
            color: #6b7280;
            font-size: 14px;
            line-height: 1.6;
            margin: 20px 0;
        }

        .close-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 35px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .close-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .close-btn:active {
            transform: translateY(0);
        }

        .auto-close {
            font-size: 13px;
            color: #9ca3af;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .countdown {
            font-weight: 600;
            color: #667eea;
            background: #f3f4f6;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 13px;
        }

        .progress-ring {
            width: 30px;
            height: 30px;
        }

        .footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
            font-size: 11px;
            color: #9ca3af;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 40px 25px;
            }
            h1 {
                font-size: 26px;
            }
            .checkmark-circle {
                width: 80px;
                height: 80px;
            }
            .checkmark {
                font-size: 45px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="checkmark-wrapper">
            <div class="checkmark-circle">
                <div class="checkmark">✓</div>
            </div>
        </div>
        
        <h1>Email Verified!</h1>
        
        <div class="message-box">
            <p>✨ Your email has been successfully confirmed ✨</p>
            <span class="small-text">You can now access all features of Isla Sync Corcuera System</span>
        </div>
        
        <p class="info-text">Thank you for verifying your account. You're all set!</p>
        
        <button class="close-btn" onclick="closeWindow()">Close Window</button>
        
        <div class="auto-close">
            <span>This window will close automatically in</span>
            <span class="countdown" id="countdown">3</span>
            <span>seconds</span>
        </div>
        
        <div class="footer">
            <p>Isla Sync Corcuera System © 2026</p>
        </div>
    </div>

    <script>
        function closeWindow() {
            window.close();
            // Fallback if window.close() doesn't work
            setTimeout(() => {
                alert('You can close this tab/window manually.');
            }, 100);
        }
        
        // Auto close countdown
        let countdown = 3;
        const countdownElement = document.getElementById('countdown');
        
        const timer = setInterval(() => {
            countdown--;
            if (countdownElement) {
                countdownElement.textContent = countdown;
            }
            
            if (countdown <= 0) {
                clearInterval(timer);
                closeWindow();
            }
        }, 1000);
    </script>
</body>
</html>
