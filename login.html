<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="login.css">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container">

    <!-- Background -->
    <div class="hero">

        <!-- Overlay -->
        <div class="overlay">

            <!-- Logo -->
            <img src="assets/isla-logo.png" class="logo">

            <h2>Welcome Back</h2>
            <p class="subtitle">Sign in to sync with Corcuera</p>

            <!-- Email -->
            <div class="input-group">
                <label>EMAIL OR USERNAME</label>
                <div class="input-box">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="text" placeholder="Enter your email">
                </div>
            </div>

            <!-- Password -->
            <div class="input-group">
                <label>PASSWORD</label>
                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="••••••••">
                    <i class="fa-regular fa-eye toggle"></i>
                </div>
            </div>

            <div class="forgot">Forgot Password?</div>

            <!-- Button -->
            <button class="btn">Log In</button>

            <!-- Divider -->
            <div class="divider">OR CONTINUE WITH</div>

            <!-- Social -->
            <div class="social">
                <div class="social-btn"><i class="fa-brands fa-google"></i></div>
                <div class="social-btn"><i class="fa-brands fa-facebook-f"></i></div>
                <div class="social-btn"><i class="fa-solid fa-envelope"></i></div>
            </div>

            <!-- Signup -->
            <p class="signup">
                Don’t have an account? <a href="sign-up.html">Sign Up</a>
            </p>

        </div>

    </div>

</div>

</body>
</html>
