<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isla-Sync Corcuera Login</title>

    <!-- CSS -->
    <link rel="stylesheet" href="welcome.css">

    <!-- Font Awesome (Modern Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container">

    <!-- Top Image -->
    <div class="hero"></div>

    <!-- Content Card -->
    <div class="card">

        <!-- Logo -->
        <div class="logo">
            <img src="assets/isla-lgo.png" alt="Logo">
        </div>

        <h1>Isla-Sync Corcuera</h1>
        <p class="subtitle">Your unified island portal</p>

        <p class="select-text">SELECT YOUR USER TYPE</p>

        <!-- Resident -->
        <div class="option active">
            <div class="icon blue">
                <i class="fa-solid fa-house"></i>
            </div>
            <div>
                <h3>Resident User</h3>
                <p>Access local services and news</p>
            </div>
        </div>

        <!-- Admin -->
        <div class="option">
            <div class="icon gray">
                <i class="fa-solid fa-user-shield"></i>
            </div>
            <div>
                <h3>Admin User</h3>
                <p>Manage island operations</p>
            </div>
        </div>

    </div>

</div>

</body>
</html>
