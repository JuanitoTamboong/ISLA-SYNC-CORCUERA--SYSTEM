<!DOCTYPE html>
<html>
<head>
    <title>Verified</title>
    <style>
        body {
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #f0f2f5;
        }
        .box {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 10px;
        }
        .check {
            font-size: 64px;
            color: #4CAF50;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="check">✅</div>
        <h2>Email Verified!</h2>
        <p>You can close this window now.</p>
    </div>
    <script>
        // Auto close after 2 seconds
        setTimeout(() => window.close(), 2000);
    </script>
</body>
</html>
