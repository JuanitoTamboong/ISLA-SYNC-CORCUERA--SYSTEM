<!-- Admin Bottom Navigation Component -->
<!--
Required placeholder markup on pages:
  <div data-component="admin-bottom-nav" data-active="home"></div>
Active values supported:
  home, map, notifications, settings

This component expects ALL admin navigation functions to exist:
  window.navigateTo(pageKey)

If navigateTo is not defined, clicks will do nothing.
-->

<div class="bottom-nav" data-bottom-nav>
  <div class="nav-item" data-key="home" onclick="window.navigateTo && window.navigateTo('home')">
    <i class="fa fa-home" aria-hidden="true"></i>
    <span>Home</span>
  </div>

  <div class="nav-item" data-key="map" onclick="window.navigateTo && window.navigateTo('map')">
    <i class="fa fa-map" aria-hidden="true"></i>
    <span>Map</span>
  </div>

  <div class="nav-item center-logo">
    <img src="__LOGO_SRC__" alt="" />
  </div>

  <div class="nav-item" data-key="notifications" onclick="window.navigateTo && window.navigateTo('news')">
    <i class="fa fa-newspaper" aria-hidden="true"></i>
    <span>News</span>
  </div>

  <div class="nav-item" data-key="settings" onclick="window.navigateTo && window.navigateTo('settings')">
    <i class="fa fa-gear" aria-hidden="true"></i>
    <span>Settings</span>
  </div>
</div>
