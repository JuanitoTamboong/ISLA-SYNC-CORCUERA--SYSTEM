<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Reports</title>
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="view-reports.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- MOBILE HEADER -->
        <div class="page-header">
            <div class="back-btn" id="backBtn">
                <i class="fa-solid fa-arrow-left"></i>
            </div>
            <h1>My Reports</h1>
            <button class="submit-new-btn" id="submitNewBtn">
                <i class="fa-solid fa-plus"></i> New Report
            </button>
        </div>

        <!-- FILTER TABS -->
        <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all">All</button>
            <button class="filter-tab" data-filter="pending">Pending</button>
            <button class="filter-tab" data-filter="resolved">Resolved</button>
        </div>

        <!-- CONTENT -->
        <div id="categoriesContainer" class="categories-grid"></div>
        <div id="loadingState" class="loading-state" style="display: none;">
            <i class="fa-solid fa-spinner fa-pulse"></i> Loading reports...
        </div>
        <div id="emptyState" class="empty-state" style="display: none;">
            <i class="fa-regular fa-folder-open"></i>
            <p>No reports submitted yet</p>
            <button class="submit-first" id="emptySubmitBtn">Submit First Report</button>
        </div>
    </div>



    <script src="app.js"></script>
    <script src="view-reports.js"></script>
</body>
</html>
