<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Reports</title>
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="view-reports.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- MOBILE HEADER -->
        <div class="page-header">
            <div class="back-btn" id="backBtn">
                <i class="fa-solid fa-arrow-left"></i>
            </div>
            <h1>My Reports</h1>
            <button class="submit-new-btn" id="submitNewBtn">
                <i class="fa-solid fa-plus"></i> New Report
            </button>
        </div>

        <!-- FILTER TABS -->
        <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all">All</button>
            <button class="filter-tab" data-filter="pending">Pending</button>
            <button class="filter-tab" data-filter="resolved">Resolved</button>
        </div>

        <!-- CONTENT -->
        <div id="categoriesContainer" class="categories-grid"></div>
        <div id="loadingState" class="loading-state" style="display: none;">
            <i class="fa-solid fa-spinner fa-pulse"></i> Loading reports...
        </div>
        <div id="emptyState" class="empty-state" style="display: none;">
            <i class="fa-regular fa-folder-open"></i>
            <p>No reports submitted yet</p>
            <button class="submit-first" id="emptySubmitBtn">Submit First Report</button>
        </div>
    </div>

    <!-- REPORT DETAIL MODAL -->
    <div id="reportModal" class="report-modal">
        <div class="modal-overlay" id="modalOverlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Report Details</h2>
                <button class="modal-close" id="modalClose">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="detail-section">
                    <label>Reference</label>
                    <p id="modalReference">-</p>
                </div>
                <div class="detail-section">
                    <label>Status</label>
                    <span id="modalStatus" class="status-badge status-pending">-</span>
                </div>
                <div class="detail-section">
                    <label>Description</label>
                    <p id="modalDescription">-</p>
                </div>
                <div class="detail-section" id="modalLocationSection" style="display: none;">
                    <label>Location</label>
                    <p id="modalLocation">-</p>
                    <a id="modalMapLink" href="#" target="_blank" class="map-link" style="display: none;">View Map</a>
                </div>
                <div class="detail-section">
                    <label>Date</label>
                    <p id="modalDate">-</p>
                </div>
                <div class="detail-section" id="modalImageSection" style="display: none;">
                    <label>Photo</label>
                    <div class="report-image-container">
                        <img id="modalImage" src="" alt="Report image">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="view-reports.js"></script>
</body>
</html>
