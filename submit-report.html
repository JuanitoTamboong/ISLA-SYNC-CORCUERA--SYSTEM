<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status</title>

<link rel="stylesheet" href="submit-report.css">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container">

    <!-- TITLE -->
    <h3 class="title">Status</h3>

    <!-- SUCCESS ICON -->
    <div class="success-circle">
        <div class="check">
            <i class="fa-solid fa-check"></i>
        </div>
    </div>

    <!-- TEXT -->
    <h2 class="main-text">Report Submitted Successfully!</h2>

    <p class="desc">
        Thank you for helping us keep Corcuera safe and beautiful. 
        Our team will review your report shortly.
    </p>

    <!-- REFERENCE -->
    <div class="ref-box">
        <span>REFERENCE NUMBER</span>
        <h4>#ISC-2024-8902</h4>
    </div>

    <!-- BUTTONS -->
    <button class="btn primary">View My Reports</button>
    <button class="btn secondary">Back to Home</button>

</div>

</body>
</html>
