<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status</title>

<link rel="stylesheet" href="../css/shared.css">
<link rel="stylesheet" href="../css/submit-report.css">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container">

    <!-- TITLE -->
    <h3 class="title">Status</h3>

    <!-- SUCCESS ICON -->
    <div class="success-circle">
        <div class="check">
            <i class="fa-solid fa-check"></i>
        </div>
    </div>

    <!-- TEXT -->
    <h2 class="main-text">Report Submitted Successfully!</h2>

    <p class="desc">
        Thank you for helping us keep Corcuera safe and beautiful. 
        Our team will review your report shortly.
    </p>

    <!-- REFERENCE -->
    <div class="ref-box">
        <span>REFERENCE NUMBER</span>
        <h4>#ISC-2024-8902</h4>
    </div>

    <!-- BUTTONS -->
    <button class="btn primary">View My Reports</button>
    <button class="btn secondary">Back to Home</button>

</div>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const currentUserStr = localStorage.getItem('currentUser');
        
        if (!currentUserStr) {
            localStorage.removeItem('currentUser');
            window.location.href = 'login.html';
            return;
        }
        
        let user;
        try {
            user = JSON.parse(currentUserStr);
            if (!user || !user.id || !user.fullName) {
                throw new Error('Invalid user data');
            }
        } catch (e) {
            console.error('Invalid currentUser JSON:', e);
            localStorage.removeItem('currentUser');
            window.location.href = 'login.html';
            return;
        }
        
        // Update page with user info
        document.querySelector('.main-text').textContent = `Report Submitted Successfully, ${user.fullName}!`;
        document.querySelector('.desc').textContent = `Thank you for helping us keep Corcuera safe and beautiful. Our team will review your report shortly.`;
        document.querySelector('.ref-box h4').textContent = `#ISC-2024-${user.id}`;
        
        // Button actions
        document.querySelector('.btn.primary').addEventListener('click', function() {
            window.location.href = 'view-reports.html';

        });
        
        document.querySelector('.btn.secondary').addEventListener('click', function() {
            window.history.back();
        });
    });
    </script>
</body>

</html>
