<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>

    <link rel="stylesheet" href="../css/sign-up.css">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container">

    <!-- Top Image -->
    <div class="hero"></div>

    <!-- Form Card -->
    <div class="card">
        <h2>Create Your Account</h2>
        <p class="subtitle">Join the Corcuera community</p>

        <!-- Full Name -->
        <div class="input-group">
            <label>Full Name</label>
            <div class="input-box">
                <i class="fa-regular fa-user"></i>
                <input type="text" placeholder="Enter your full name">
            </div>
        </div>

        <!-- Email -->
        <div class="input-group">
            <label>Email Address</label>
            <div class="input-box">
                <i class="fa-regular fa-envelope"></i>
                <input type="email" placeholder="name@example.com">
            </div>
        </div>

        <!-- Password -->
        <div class="input-group">
            <label>Password</label>
            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input type="password" placeholder="Create a password">
                <i class="fa-regular fa-eye toggle"></i>
            </div>
        </div>

        <!-- Confirm Password -->
        <div class="input-group">
            <label>Confirm Password</label>
            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input type="password" placeholder="Repeat password">
                <i class="fa-regular fa-eye toggle"></i>
            </div>

        </div>

        <!-- Button -->
        <button class="btn">Sign Up</button>

        <!-- Divider -->
        <div class="divider">
            <span>or continue with</span>
        </div>

        <!-- Social -->
        <div class="social">
            <div class="circle"><i class="fa-brands fa-google"></i></div>
            <div class="circle"><i class="fa-brands fa-facebook-f"></i></div>
            <div class="circle"><i class="fa-solid fa-at"></i></div>
        </div>

        <!-- Login -->
        <p class="login-text">
            Already have an account? <a href="login.html">Log In</a>
        </p>

    </div>

</div>
<!-- Add at the bottom of the body tag, before closing </body> -->
<script type="module" src="../js/sign-up.js"></script>
</body>
</html>
