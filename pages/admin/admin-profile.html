<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Profile</title>

<link rel="stylesheet" href="../../css/admin/admin-shared.css">
<link rel="stylesheet" href="../../css/admin/admin-profile.css">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <i class="fa-solid fa-arrow-left"></i>
        <h2>Admin Profile</h2>
    </div>

    <!-- PROFILE -->
    <div class="profile">
    <div class="avatar">
<img id="adminAvatar" class="avatar-img" src="" alt="Admin Avatar">
            <div class="avatar-placeholder">
                <i class="fa-solid fa-user"></i>
            </div>
            <span class="status"></span>
        </div>

        <h2 id="adminDisplayName">Admin</h2>
        <p class="role">SYSTEM ADMINISTRATOR</p>

        <div class="badges">
            <span class="verified">
                <i class="fa-solid fa-shield-halved"></i> VERIFIED ADMIN
            </span>
            <span class="active">ACTIVE</span>
        </div>

        <button class="edit-profile-btn" id="editProfileBtn">
            <i class="fa-solid fa-pen"></i> Edit Profile
        </button>
    </div>

    <!-- EDIT PROFILE FORM -->
    <div class="edit-profile-form" id="editProfileForm">
        <div class="form-group photo-section">
            <label class="form-label">Profile Photo</label>
            <div class="photo-container">
                <input type="file" id="photoInput" accept="image/*" style="display: none;">
                <img id="photoPreview" class="photo-preview" src="" alt="Preview" style="display: none;">
                <div id="photoPlaceholder">
                    <i class="fa-solid fa-user"></i>
                </div>
                <button type="button" id="changePhotoBtn" class="btn btn-secondary">Change Photo</button>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-input" id="formFullName" placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" class="form-input" id="formEmail" placeholder="your@email.com">
            </div>
        </div>

        <div class="form-actions">
            <button type="button" class="btn btn-secondary" id="cancelEdit">Cancel</button>
            <button type="button" class="btn btn-primary" id="saveProfile">Save Profile</button>
        </div>
    </div>

    <!-- PERSONAL INFO -->
    <h3 class="section-title">PERSONAL INFORMATION</h3>

    <div class="card">

        <div class="row">
            <i class="fa-regular fa-user"></i>
            <div>
                <p class="label">Full Name</p>
                <h4 id="adminFullName">Loading...</h4>
            </div>
        </div>

        <div class="divider"></div>

        <div class="row">
            <i class="fa-regular fa-envelope"></i>
            <div>
                <p class="label">Email Address</p>
                <h4 id="adminEmail">Loading...</h4>
            </div>
        </div>

        <div class="divider"></div>

        <div class="row">
            <i class="fa-regular fa-id-badge"></i>
            <div>
                <p class="label">Account ID</p>
                <h4 id="adminAccountId">Loading...</h4>
            </div>
        </div>

    </div>

    <!-- ADMIN CONTROLS -->
    <h3 class="section-title">ADMIN CONTROLS</h3>

    <div class="card">

        <div class="row arrow">
            <i class="fa-solid fa-clipboard-list"></i>
            <span>System Logs</span>
            <i class="fa-solid fa-chevron-right"></i>
        </div>

        <div class="divider"></div>

        <div class="row arrow">
            <i class="fa-solid fa-shield"></i>
            <span>Permissions & Access</span>
            <i class="fa-solid fa-chevron-right"></i>
        </div>

        <div class="divider"></div>

        <div class="row arrow">
            <i class="fa-solid fa-user-plus"></i>
            <span>Manage Moderators</span>
            <i class="fa-solid fa-chevron-right"></i>
        </div>

    </div>

</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../../js/admin/admin-profile.js"></script>
</body>
</html>
