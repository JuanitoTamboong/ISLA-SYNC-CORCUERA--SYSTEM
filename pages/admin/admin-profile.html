<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Profile</title>

<link rel="stylesheet" href="../../css/admin/admin-shared.css">
<link rel="stylesheet" href="../../css/admin/admin-profile.css">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <i class="fa-solid fa-arrow-left"></i>
        <h2>Admin Profile</h2>
    </div>

    <!-- PROFILE -->
    <div class="profile">
        <div class="avatar">
            <img src="../../assets/isla-logo.png" alt="Admin Avatar">
            <span class="status"></span>
        </div>

        <h2>Admin Maria</h2>
        <p class="role">SYSTEM ADMINISTRATOR</p>

        <div class="badges">
            <span class="verified">
                <i class="fa-solid fa-shield-halved"></i> VERIFIED ADMIN
            </span>
            <span class="active">ACTIVE</span>
        </div>
    </div>

    <!-- PERSONAL INFO -->
    <h3 class="section-title">PERSONAL INFORMATION</h3>

    <div class="card">

        <div class="row">
            <i class="fa-regular fa-user"></i>
            <div>
                <p class="label">Full Name</p>
                <h4>Maria Corcuera-Santos</h4>
            </div>
        </div>

        <div class="divider"></div>

        <div class="row">
            <i class="fa-regular fa-envelope"></i>
            <div>
                <p class="label">Email Address</p>
                <h4>maria.admin@islasync.gov</h4>
            </div>
        </div>

        <div class="divider"></div>

        <div class="row">
            <i class="fa-regular fa-id-badge"></i>
            <div>
                <p class="label">Employee ID</p>
                <h4>ISC-2024-0892</h4>
            </div>
        </div>

    </div>

    <!-- ADMIN CONTROLS -->
    <h3 class="section-title">ADMIN CONTROLS</h3>

    <div class="card">

        <div class="row arrow">
            <i class="fa-solid fa-clipboard-list"></i>
            <span>System Logs</span>
            <i class="fa-solid fa-chevron-right"></i>
        </div>

        <div class="divider"></div>

        <div class="row arrow">
            <i class="fa-solid fa-shield"></i>
            <span>Permissions & Access</span>
            <i class="fa-solid fa-chevron-right"></i>
        </div>

        <div class="divider"></div>

        <div class="row arrow">
            <i class="fa-solid fa-user-plus"></i>
            <span>Manage Moderators</span>
            <i class="fa-solid fa-chevron-right"></i>
        </div>

    </div>

</div>

</body>
</html>
