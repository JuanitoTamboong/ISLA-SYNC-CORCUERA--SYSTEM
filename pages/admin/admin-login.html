<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>

 <link rel="stylesheet" href="../../css/login.css">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container">

    <!-- Background -->
    <div class="hero">

        <!-- Overlay -->
        <div class="overlay">

            <!-- Logo -->
            <img src="../../assets/isla-logo.png" class="logo">

            <h2>Admin Portal</h2>
            <p class="subtitle">Sign in to manage island operations</p>

            <!-- Email -->
            <div class="input-group">
                <label>EMAIL OR USERNAME</label>
                <div class="input-box">
                    <i class="fa-regular fa-envelope"></i>
                    <input type="text" placeholder="Enter your email">
                </div>
            </div>

            <!-- Password -->
            <div class="input-group">
                <label>PASSWORD</label>
                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="Enter Password">
                    <i class="fa-regular fa-eye toggle"></i>
                </div>
            </div>

            <div class="forgot">Forgot Password?</div>

            <!-- Button -->
            <button class="btn">Admin Log In</button>

            <!-- Back to home -->
            <p class="signup">
                <a href="/pages/welcome.html">← Back to Home</a>
            </p>

        </div>

    </div>

</div>

</body>
</html>
