<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>

    <link rel="stylesheet" href="../../css/login.css">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container">

    <!-- Background -->
    <div class="hero">

        <!-- Overlay -->
        <div class="overlay">

            <!-- Back Button -->
            <a href="../welcome.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>

            <!-- Logo -->
            <img src="../../assets/isla-logo.png" class="logo">

            <h2>Admin Portal</h2>
            <p class="subtitle">Sign in to manage island operations</p>

            <form id="adminLoginForm">
                <!-- Email -->
                <div class="input-group">
                    <label>EMAIL</label>
                    <div class="input-box">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="text" id="emailInput" placeholder="Enter your email" autocomplete="username">
                    </div>
                </div>

                <!-- Password -->
                <div class="input-group">
                    <label>PASSWORD</label>
                    <div class="input-box">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="passwordInput" placeholder="Enter Password" autocomplete="current-password">
                        <i class="fa-regular fa-eye toggle" id="togglePassword"></i>
                    </div>
                </div>

                <div class="forgot" id="forgotPassword">Forgot Password?</div>

                <!-- Button -->
                <button type="submit" class="btn" id="loginButton">Admin Log In</button>
            </form>

            <!-- Back to home -->
            <p class="signup">
                <a href="../welcome.html">← Back to Home</a>
            </p>

        </div>

    </div>

</div>

<!-- Load Supabase SDK first -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
<!-- Then load admin login script -->
<script src="../../js/admin-login.js"></script>

</body>
</html>
