<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Reset Password - Isla-Sync Corcuera</title>
    <link rel="stylesheet" href="../../css/reset-password.css">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
    <!-- Background -->
    <div class="hero">
        <!-- Overlay -->
        <div class="overlay">
            <!-- Back Button -->
            <a href="admin-login.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>

            <!-- Logo -->
            <img src="../../assets/isla-logo.png" class="logo" alt="Isla-Sync Logo">

            <h2>Create New Password</h2>
            <p class="subtitle">Enter your new admin password below</p>

            <!-- Password Requirements -->
            <div class="password-requirements">
                <div class="req-item" id="reqLength">
                    <i class="fas fa-circle"></i>
                    <span>At least 8 characters</span>
                </div>
                <div class="req-item" id="reqLower">
                    <i class="fas fa-circle"></i>
                    <span>At least one lowercase letter</span>
                </div>
                <div class="req-item" id="reqUpper">
                    <i class="fas fa-circle"></i>
                    <span>At least one uppercase letter</span>
                </div>
                <div class="req-item" id="reqNumber">
                    <i class="fas fa-circle"></i>
                    <span>At least one number</span>
                </div>
            </div>

            <form id="adminResetPasswordForm">
                <!-- New Password -->
                <div class="input-group">
                    <label>NEW PASSWORD</label>
                    <div class="input-box">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="newPassword" placeholder="Enter new password" required>
                        <i class="fas fa-eye toggle" id="toggleNewPassword"></i>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="input-group">
                    <label>CONFIRM PASSWORD</label>
                    <div class="input-box">
                        <i class="fas fa-check-circle"></i>
                        <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                        <i class="fas fa-eye toggle" id="toggleConfirmPassword"></i>
                    </div>
                </div>

                <!-- Password Match Message -->
                <div id="passwordMatchMessage" class="password-match-message"></div>

                <!-- Button -->
                <button type="submit" class="btn" id="resetButton">
                    <i class="fas fa-sync-alt"></i> Reset Password
                </button>
            </form>
        </div>
    </div>
</div>

<!-- Load Supabase SDK first -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
<!-- Then load admin reset password script - Using absolute path from root -->
<script src="../../js/admin/admin-reset-password.js"></script>
</body>
</html>
