<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appearance</title>

  <link rel="stylesheet" href="../theme/theme.css">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <script src="../theme/theme-manager.js" defer></script>
</head>

<body>
  <div class="container">
    <div class="header">
      <i class="fa fa-chevron-left" id="back-btn" aria-label="Go back"></i>
      <h2>Appearance</h2>
      <div style="width: 40px;"></div> </div>

    <p class="section-title">Theme Preference</p>

    <div class="card theme-card">
      <div class="theme-option" data-theme-value="light">
        <div class="theme-left">
          <div class="theme-dot light-dot"></div>
          <div class="theme-meta">
            <h4>Light Mode</h4>
            <p>Bright background with crisp, dark text.</p>
          </div>
        </div>
        <div class="custom-radio">
          <i class="fa fa-check" aria-hidden="true"></i>
        </div>
      </div>

      <div class="divider"></div>

      <div class="theme-option" data-theme-value="dark">
        <div class="theme-left">
          <div class="theme-dot dark-dot"></div>
          <div class="theme-meta">
            <h4>Dark Mode</h4>
            <p>Easy on the eyes, ideal for low-light environments.</p>
          </div>
        </div>
        <div class="custom-radio">
          <i class="fa fa-check" aria-hidden="true"></i>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
