<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explore</title>

<link rel="stylesheet" href="../css/tourist-spot.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Tourist Spot JS -->
<script src="../js/tourist-spot.js"></script>
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <i class="fa-solid fa-arrow-left"></i>
        <div>
            <h2>Isla-Sync-Corcuera</h2>
            <p>Explore Simara Island</p>
        </div>
    </div>

    <!-- SEARCH BOX -->
    <div class="search-box">
        <i class="fa fa-search"></i>
        <input type="text" placeholder="Find spots in corcuera...">
    </div>

    <!-- FILTER -->
    <div class="filters">
        <div class="pill active"><i class="fas fa-umbrella-beach"></i> Beaches</div>
        <div class="pill"><i class="fas fa-landmark"></i> Landmarks</div>
        <div class="pill"><i class="fas fa-store"></i> Souvenirs</div>
    </div>

    <!-- LANDMARK -->
    <div class="section">
        <div class="section-header">
            <h3>Landmark Spots</h3>
            <span>See all</span>
        </div>
    <div class="scroll" id="landmarkScroll">
        </div>
    </div>

    <!-- SOUVENIRS -->
    <div class="section">
        <div class="section-header">
            <h3>Local Souvenirs</h3>
            <i class="fa-solid fa-sliders"></i>
        </div>
    <div class="grid" id="souvenirGrid">
        </div>
    </div>

</div>

</body>
</html>
