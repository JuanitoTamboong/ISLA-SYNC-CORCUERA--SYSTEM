<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>IslaSync Corcuera | Explore Simara Island</title>

<!-- Font Awesome 6 -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Main CSS -->
<link rel="stylesheet" href="../css/tourist-spot.css">

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Main JavaScript -->
<script src="../js/tourist-spot.js" defer></script>
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <i class="fa-solid fa-arrow-left" id="backButton"></i>
        <div>
            <h2>IslaSync Corcuera</h2>
            <p>Explore Simara Island</p>
        </div>
    </div>

    <!-- SEARCH BOX -->
    <div class="search-box">
        <i class="fa fa-search"></i>
        <input type="text" id="searchInput" placeholder="Find spots in Corcuera..." autocomplete="off">
    </div>

    <!-- FILTER PILLS -->
    <div class="filters" id="filterContainer">
        <div class="pill active" data-filter="all">
            <i class="fas fa-list"></i> All
        </div>
        <div class="pill" data-filter="beaches">
            <i class="fas fa-umbrella-beach"></i> Beaches
        </div>
        <div class="pill" data-filter="landmarks">
            <i class="fas fa-landmark"></i> Landmarks
        </div>
        <div class="pill" data-filter="souvenirs">
            <i class="fas fa-store"></i> Souvenirs
        </div>
    </div>

    <!-- BEACHES SECTION -->
    <div class="section" id="beachesSection">
        <div class="section-header">
            <h3><i class="fas fa-umbrella-beach"></i> Beaches</h3>
            <span class="see-all" data-section="beaches">See all</span>
        </div>
        <div class="scroll" id="beachesScroll">
            <!-- Skeleton loaders will appear here -->
            <div class="skeleton-card"><div class="skeleton-image"></div><div class="skeleton-body"><div class="skeleton-title"></div><div class="skeleton-rating"></div><div class="skeleton-location"></div></div></div>
            <div class="skeleton-card"><div class="skeleton-image"></div><div class="skeleton-body"><div class="skeleton-title"></div><div class="skeleton-rating"></div><div class="skeleton-location"></div></div></div>
            <div class="skeleton-card"><div class="skeleton-image"></div><div class="skeleton-body"><div class="skeleton-title"></div><div class="skeleton-rating"></div><div class="skeleton-location"></div></div></div>
        </div>
    </div>

    <!-- LANDMARK SPOTS SECTION -->
    <div class="section" id="landmarkSection">
        <div class="section-header">
            <h3><i class="fas fa-landmark"></i> Landmark Spots</h3>
            <span class="see-all" data-section="landmarks">See all</span>
        </div>
        <div class="scroll" id="landmarkScroll">
            <!-- Skeleton loaders will appear here -->
            <div class="skeleton-card"><div class="skeleton-image"></div><div class="skeleton-body"><div class="skeleton-title"></div><div class="skeleton-rating"></div><div class="skeleton-location"></div></div></div>
            <div class="skeleton-card"><div class="skeleton-image"></div><div class="skeleton-body"><div class="skeleton-title"></div><div class="skeleton-rating"></div><div class="skeleton-location"></div></div></div>
            <div class="skeleton-card"><div class="skeleton-image"></div><div class="skeleton-body"><div class="skeleton-title"></div><div class="skeleton-rating"></div><div class="skeleton-location"></div></div></div>
        </div>
    </div>

    <!-- LOCAL SOUVENIRS SECTION -->
    <div class="section" id="souvenirSection">
        <div class="section-header">
            <h3><i class="fas fa-store"></i> Local Souvenirs</h3>
            <i class="fa-solid fa-sliders" id="filterSouvenirIcon"></i>
        </div>
        <div class="grid" id="souvenirGrid">
            <!-- Skeleton loaders will appear here -->
            <div class="skeleton-product"><div class="skeleton-product-image"></div><div class="skeleton-product-title"></div><div class="skeleton-product-price"></div></div>
            <div class="skeleton-product"><div class="skeleton-product-image"></div><div class="skeleton-product-title"></div><div class="skeleton-product-price"></div></div>
            <div class="skeleton-product"><div class="skeleton-product-image"></div><div class="skeleton-product-title"></div><div class="skeleton-product-price"></div></div>
            <div class="skeleton-product"><div class="skeleton-product-image"></div><div class="skeleton-product-title"></div><div class="skeleton-product-price"></div></div>
        </div>
    </div>

</div>

<!-- MODAL FOR SPOT DETAILS (Compact - No Description) -->
<div id="spotModal" class="modal">
    <div class="modal-content compact-modal">
        <div class="modal-header">
            <h2 id="modalSpotName"></h2>
            <span class="close-modal">&times;</span>
        </div>
        <div class="modal-body">
            <img id="modalSpotImage" src="" alt="">
            <div class="modal-info">
                <p id="modalSpotRating"><i class="fas fa-star"></i> <span></span></p>
                <p id="modalSpotLocation"><i class="fas fa-location-dot"></i> <span></span></p>
                <p id="modalSpotCategory"><i class="fas fa-tag"></i> <span></span></p>
                
                <!-- LOCAL DRIVERS SECTION IN MODAL -->
                <div class="modal-drivers-section" id="modalDriversSection">
                    <h4><i class="fas fa-users"></i> Local Drivers</h4>
                    <div id="modalDriversList" class="drivers-list">
                        <!-- Drivers will be dynamically inserted here -->
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- MODAL FOR SOUVENIR DETAILS (No View Details) -->
<div id="souvenirModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalSouvenirName"></h2>
            <span class="close-modal">&times;</span>
        </div>
        <div class="modal-body">
            <img id="modalSouvenirImage" src="" alt="">
            <div class="modal-info">
                <p id="modalSouvenirPrice"><i class="fas fa-tag"></i> <span></span></p>
                <p id="modalSouvenirShop"><i class="fas fa-store"></i> <span></span></p>
                <button class="buy-now-btn" id="buyNowBtn"><i class="fas fa-shopping-cart"></i> Inquire Now</button>
            </div>
        </div>
    </div>
</div>

<div id="notificationContainer"></div>

</body>
</html>
